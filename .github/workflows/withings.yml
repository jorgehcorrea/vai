name: Fetch Withings Data

on:
  schedule:
    - cron: '0 12 * * *'  # Every day at 7am Ecuador time (UTC-5 = 12:00 UTC)
  workflow_dispatch:       # Allow manual trigger

jobs:
  fetch-weight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Refresh Withings token and fetch weight
        env:
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_REFRESH_TOKEN: ${{ secrets.WITHINGS_REFRESH_TOKEN }}
        run: |
          # Step 1: Get new access token using refresh token
          TOKEN_RESPONSE=$(curl -s -X POST "https://wbsapi.withings.net/v2/oauth2" \
            -d "action=requesttoken" \
            -d "grant_type=refresh_token" \
            -d "client_id=$WITHINGS_CLIENT_ID" \
            -d "client_secret=$WITHINGS_CLIENT_SECRET" \
            -d "refresh_token=$WITHINGS_REFRESH_TOKEN")

          echo "Token response: $TOKEN_RESPONSE"

          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['body']['access_token'])")
          NEW_REFRESH_TOKEN=$(echo $TOKEN_RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['body']['refresh_token'])")

          echo "Got access token"

          # Step 2: Fetch weight measurements (last 30 days)
          START_DATE=$(date -d '30 days ago' +%s)
          END_DATE=$(date +%s)

          WEIGHT_RESPONSE=$(curl -s -X GET \
            "https://wbsapi.withings.net/measure?action=getmeas&meastype=1&category=1&startdate=$START_DATE&enddate=$END_DATE" \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          echo "Weight response received"

          # Step 3: Process and save to data/weight.json
          python3 << 'PYTHON'
          import json, os, sys
          from datetime import datetime

          weight_raw = os.environ.get('WEIGHT_DATA', '')

          # Read existing data
          try:
              with open('data/weight.json', 'r') as f:
                  existing = json.load(f)
          except:
              existing = {"entries": [], "last_updated": ""}

          # Parse new data
          try:
              data = json.loads('$WEIGHT_RESPONSE'.replace("'", '"'))
              if data.get('status') == 0:
                  groups = data['body']['measuregrps']
                  new_entries = []
                  for g in groups:
                      for m in g['measures']:
                          if m['type'] == 1:  # weight
                              weight_kg = m['value'] * (10 ** m['unit'])
                              date_str = datetime.fromtimestamp(g['date']).strftime('%Y-%m-%d')
                              new_entries.append({
                                  "date": date_str,
                                  "weight_kg": round(weight_kg, 2),
                                  "timestamp": g['date']
                              })

                  # Merge with existing, deduplicate by date
                  all_entries = {e['date']: e for e in existing['entries']}
                  for e in new_entries:
                      all_entries[e['date']] = e

                  existing['entries'] = sorted(all_entries.values(), key=lambda x: x['date'], reverse=True)
                  existing['last_updated'] = datetime.now().strftime('%Y-%m-%d %H:%M:%S')

                  os.makedirs('data', exist_ok=True)
                  with open('data/weight.json', 'w') as f:
                      json.dump(existing, f, indent=2)

                  print(f"Saved {len(existing['entries'])} weight entries")
              else:
                  print(f"Withings API error: {data.get('status')}")
          except Exception as e:
              print(f"Error processing data: {e}")
          PYTHON

      - name: Update refresh token in secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_REFRESH: ${{ env.NEW_REFRESH_TOKEN }}
        run: |
          echo "Note: Refresh token rotation requires manual update if it changes"

      - name: Commit weight data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/weight.json
          git diff --staged --quiet || git commit -m "Update weight data $(date +%Y-%m-%d)"
          git push
