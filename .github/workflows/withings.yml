name: Fetch Withings Data

on:
  schedule:
    - cron: '0 12 * * *'   # 07:00 Ecuador time (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh token and fetch weight
        env:
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_REFRESH_TOKEN: ${{ secrets.WITHINGS_REFRESH_TOKEN }}
        run: |
          # 1 — Get a fresh access token via refresh_token grant
          TOKEN_JSON=$(curl -s -X POST "https://wbsapi.withings.net/v2/oauth2" \
            -d "action=requesttoken" \
            -d "grant_type=refresh_token" \
            -d "client_id=${WITHINGS_CLIENT_ID}" \
            -d "client_secret=${WITHINGS_CLIENT_SECRET}" \
            -d "refresh_token=${WITHINGS_REFRESH_TOKEN}")

          echo "Token response: ${TOKEN_JSON}"

          ACCESS_TOKEN=$(echo "${TOKEN_JSON}" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['body']['access_token'])")

          echo "Access token obtained"

          # 2 — Fetch weight measurements for the last 30 days (meastype=1)
          START_DATE=$(date -d '30 days ago' +%s)
          END_DATE=$(date +%s)

          WEIGHT_JSON=$(curl -s -G \
            "https://wbsapi.withings.net/measure" \
            --data-urlencode "action=getmeas" \
            --data-urlencode "meastype=1" \
            --data-urlencode "category=1" \
            -d "startdate=${START_DATE}" \
            -d "enddate=${END_DATE}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}")

          echo "Weight response: ${WEIGHT_JSON}"

          # 3 — Write raw response to temp file for the Python script
          echo "${WEIGHT_JSON}" > /tmp/weight_raw.json

      - name: Process and save weight data
        run: python3 scripts/process_weight.py

      - name: Commit weight data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weight.json
          git diff --staged --quiet || \
            git commit -m "chore: update weight data $(date -u +%Y-%m-%d)"
          git push
